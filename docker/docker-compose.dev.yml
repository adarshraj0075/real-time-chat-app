services:
  backend:
    build:
      context: ../backend
      dockerfile: Dockerfile
    container_name: chat-backend-dev
    ports:
      - "5002:5000"
    volumes:
      - ../backend:/app
      - /app/node_modules
    env_file:
      - ../backend/.env
    depends_on:
      - mongo
    networks:
      - chat-network

  mongo:
    image: mongo:7
    container_name: chat-mongo-dev
    ports:
      - "27016:27017"
    volumes:
      - mongo_data:/data/db
    networks:
      - chat-network

volumes:
  mongo_data:

networks:
  chat-network:
    driver: bridge